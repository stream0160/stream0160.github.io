<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            flex-direction: column;
            gap:10px
        }
        .container{
            width: 100%;
        }
        .header{
            background-color: rgb(156, 180, 248);
            display: flex;
            justify-content: center;
        }
        .header > .container{
            background-color: rgb(40, 90, 241);
            height: 40px;
        }
        .footer{
            background-color: rgb(167, 168, 168);
            display: flex;
            justify-content: center;
        }
        .footer > .container{
            background-color: rgb(26, 129, 226);
            height: 40px;
        }
        .main{
            display: flex;
            justify-content: center;
        }
        .main > .container{
            display: flex;
            gap:10px;
        }
        .main1{
            display: flex;
            justify-content: center;
        }
        .main2{
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .main3{
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .main1 > .container{
            display: flex;
            gap:10px;
        }
        .main2 > .fx{
            display: flex;
            gap:10px;
            flex-direction: column;
        }
        .main3 > .fx{
            display: flex;
            gap:10px;
            

        }
        .main3 >.fx > .fxx{
            display: flex;
            gap:10px;
        }
        .left{
            background-color: rgb(233, 228, 224);
            height: 200px;
            flex:auto;
            display: flex;
            gap:10px
        }
        .fx{
            background-color:rgb(238, 240, 244);
            height: 200px;
            flex:auto;
        }
        .right{
            width: 400px;
            height: 200px;
            display: flex;
            gap:10px ;
        }
        .item{
            background-color: rgb(238, 242, 237);
            height: 200px;
            width: 300px;
        }
        .fxx{
            background-color:rgb(194, 203, 244);
            height: auto;
            flex:auto;
        }
        .main2 >.fx > .fxx{
            display: flex;
            gap:10px;
        }
        .fxxx{
            background-color:rgb(217, 222, 242);
            height: auto;
            flex:auto; 
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container"></div>
    </div>
    <div class="main">
        <div class="container">
            <div class="left">
            </div>
            <div class="right">
                <div class="item"></div>
                <div class="item"></div>
            </div>
        </div>
    </div>
    <div class="main1">
        <div class="container">
            <div class="right">
                <div class="item"></div>
                <div class="item"></div>
            </div>
            <div class="left">
            </div>
        </div>
    </div>
    <div class="main2">
        <div class="fx">
            <div class="fxx"></div>
            <div class="fxx"></div>
            <div class="fxx"></div>
            <div class="fxx"></div>
        </div>
        <div class="fx">
            <div class="fxx"></div>
            <div class="fxx"></div>
            <div class="fxx"></div>
            <div class="fxx"></div>
        </div>
    </div>
    <div class="main3">
        <div class="fx">
            <div class="fxx"></div>
            <div class="fxx"></div>
            <div class="fxx"></div>
            <div class="fxx"></div>
            <div class="fxx"></div>
        </div>
        <div class="fx"></div>
        <div class="fx">
            <div class="fxx">
                <div class="fxxx"></div>
                <div class="fxxx"></div>
            </div>
            <div class="fxx">
                <div class="fxxx"></div>
                <div class="fxxx"></div>
            </div>
            <div class="fxx">
                <div class="fxxx"></div>
                <div class="fxxx"></div>
            </div>
            <div class="fxx">
                <div class="fxxx"></div>
                <div class="fxxx"></div>
            </div>
            <div class="fxx">
                <div class="fxxx"></div>
                <div class="fxxx"></div>
            </div>
            <div class="fxx">
                <div class="fxxx"></div>
                <div class="fxxx"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="container"></div>
    </div>
</body>
</html>
